<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Royal Bay — Banner Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --rb-lime: #c8e000;
      --rb-lime-dark: #a0b400;
      --bg: #0e0e0e;
      --surface: #161616;
      --surface2: #222;
      --border: #2e2e2e;
      --text: #f0f0f0;
      --muted: #666;
      --radius: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      padding: 0 24px;
      height: 52px;
      background: #000;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .rb-logo {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .rb-cross {
      color: var(--rb-lime);
      font-size: 22px;
      font-weight: 900;
      line-height: 1;
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: -1px;
    }

    .rb-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 2px;
      color: #fff;
    }

    .header-divider {
      width: 1px;
      height: 20px;
      background: var(--border);
    }

    header h1 {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.3px;
    }

    /* ── LAYOUT ── */
    .app {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── PANEL ── */
    .panel {
      width: 300px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .panel-section {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
    }

    .section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.4px;
      color: var(--muted);
      margin-bottom: 12px;
      font-weight: 600;
    }

    label {
      display: block;
      font-size: 12px;
      color: #999;
      margin-bottom: 4px;
      margin-top: 10px;
    }

    label:first-of-type { margin-top: 0; }

    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      padding: 7px 10px;
      outline: none;
      font-family: inherit;
      transition: border-color .15s;
    }

    input[type="text"]:focus,
    select:focus { border-color: var(--rb-lime); }

    /* Color row */
    .color-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }

    .color-row input[type="color"] {
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px;
      background: var(--surface2);
      cursor: pointer;
      flex-shrink: 0;
    }

    .color-row span { font-size: 11px; color: var(--muted); }

    /* Brand palette */
    .brand-palette {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .swatch {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color .15s, transform .1s;
      flex-shrink: 0;
    }

    .swatch:hover { transform: scale(1.1); }
    .swatch[title]:hover { border-color: rgba(255,255,255,0.3); }

    /* Range */
    input[type="range"] {
      width: 100%;
      accent-color: var(--rb-lime);
      margin-top: 4px;
    }

    .range-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }

    .range-row input { flex: 1; }
    .range-row .val { font-size: 11px; color: var(--muted); min-width: 30px; text-align: right; }

    /* Toggle */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }

    .toggle-row > label { margin: 0; font-size: 12px; color: #999; }

    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .knob {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: background .2s;
    }

    .knob:before {
      content: '';
      position: absolute;
      left: 3px; top: 3px;
      width: 14px; height: 14px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s;
    }

    .toggle input:checked + .knob { background: var(--rb-lime); }
    .toggle input:checked + .knob:before { transform: translateX(16px); }

    /* Upload */
    .upload-area {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 10px;
      background: var(--surface2);
      border: 1px dashed var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      transition: border-color .15s, color .15s;
      margin-top: 4px;
    }

    .upload-area:hover { border-color: var(--rb-lime); color: var(--rb-lime); }
    .upload-area svg { width: 15px; height: 15px; flex-shrink: 0; }

    /* Format grid */
    .fmt-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
    }

    .fmt-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 3px 6px;
      cursor: pointer;
      text-align: center;
      transition: border-color .15s, background .15s;
    }

    .fmt-btn.active {
      border-color: var(--rb-lime);
      background: rgba(200,224,0,.08);
    }

    .fmt-icon {
      margin: 0 auto 4px;
      background: var(--border);
      border-radius: 2px;
    }

    .fmt-btn.active .fmt-icon { background: var(--rb-lime); opacity: 0.6; }

    .fmt-btn .name { font-size: 10px; color: var(--muted); display: block; }
    .fmt-btn .dim  { font-size: 9px; color: #444; display: block; margin-top: 1px; }
    .fmt-btn.active .name { color: var(--rb-lime); }

    /* ── CANVAS AREA ── */
    .canvas-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      padding: 28px;
      overflow: auto;
      gap: 16px;
    }

    .canvas-wrapper {
      position: relative;
      box-shadow: 0 12px 50px rgba(0,0,0,.7);
      border-radius: 3px;
      overflow: hidden;
      cursor: crosshair;
    }

    #bannerCanvas { display: block; }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 9px 20px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity .15s, transform .1s;
      font-family: inherit;
    }

    .btn:active { transform: scale(0.97); }

    .btn-lime { background: var(--rb-lime); color: #000; }
    .btn-lime:hover { opacity: 0.88; }

    .btn-ghost {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover { border-color: var(--rb-lime); color: var(--rb-lime); }

    .size-label {
      font-size: 11px;
      color: #444;
      text-align: center;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="rb-logo">
    <span class="rb-cross">×</span>
    <span class="rb-name">ROYAL BAY</span>
  </div>
  <div class="header-divider"></div>
  <h1>Banner Generator</h1>
</header>

<div class="app">

  <!-- ── PANEL ── -->
  <aside class="panel">

    <!-- Format -->
    <div class="panel-section">
      <div class="section-title">Formát</div>
      <div class="fmt-grid" id="formatGrid">
        <div class="fmt-btn active" data-w="1200" data-h="628" data-id="fb-feed" data-align="left">
          <div class="fmt-icon" style="width:28px;height:15px;"></div>
          <span class="name">FB Feed</span>
          <span class="dim">1200×628</span>
        </div>
        <div class="fmt-btn" data-w="1080" data-h="1080" data-id="square" data-align="center">
          <div class="fmt-icon" style="width:20px;height:20px;"></div>
          <span class="name">Čtverec</span>
          <span class="dim">1080×1080</span>
        </div>
        <div class="fmt-btn" data-w="1080" data-h="1920" data-id="story" data-align="center">
          <div class="fmt-icon" style="width:11px;height:20px;"></div>
          <span class="name">Story</span>
          <span class="dim">1080×1920</span>
        </div>
        <div class="fmt-btn" data-w="960" data-h="1200" data-id="portrait" data-align="center">
          <div class="fmt-icon" style="width:16px;height:20px;"></div>
          <span class="name">Portrét</span>
          <span class="dim">960×1200</span>
        </div>
      </div>
    </div>

    <!-- Background -->
    <div class="panel-section">
      <div class="section-title">Pozadí</div>
      <label class="upload-area" for="bgUpload">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        Nahrát fotku pozadí
      </label>
      <input type="file" id="bgUpload" accept="image/*" style="display:none" />

      <label>Tmavý překryv</label>
      <div class="range-row">
        <input type="range" id="overlayOpacity" min="0" max="100" value="45" />
        <span class="val" id="overlayVal">45%</span>
      </div>
    </div>

    <!-- Brand Palette -->
    <div class="panel-section">
      <div class="section-title">Brand paleta</div>
      <div class="brand-palette">
        <div class="swatch" style="background:#c8e000" title="#c8e000 — Lime" data-color="#c8e000"></div>
        <div class="swatch" style="background:#ffffff" title="#ffffff — Bílá" data-color="#ffffff"></div>
        <div class="swatch" style="background:#000000;border:1px solid #333" title="#000000 — Černá" data-color="#000000"></div>
        <div class="swatch" style="background:#1a1a1a;border:1px solid #333" title="#1a1a1a — Tmavá šedá" data-color="#1a1a1a"></div>
        <div class="swatch" style="background:#e8f460" title="#e8f460 — Lime světlá" data-color="#e8f460"></div>
        <div class="swatch" style="background:#a0b400" title="#a0b400 — Lime tmavá" data-color="#a0b400"></div>
      </div>
      <p style="font-size:10px;color:#444;margin-top:8px">Klikněte na barvu a pak na color picker pro rychlé použití.</p>
    </div>

    <!-- Text -->
    <div class="panel-section">
      <div class="section-title">Text banneru</div>

      <label>Brand watermark (vlevo nahoře)</label>
      <input type="text" id="txtWatermark" value="ROYAL BAY" />

      <label>Řádek 1 — hlavní</label>
      <input type="text" id="txtMain" value="SPOUŠTÍME" />
      <div class="color-row">
        <input type="color" id="clrMain" value="#ffffff" />
        <span>Barva</span>
      </div>

      <label>Řádek 2 — akcent (lime)</label>
      <input type="text" id="txtAccent" value="OUTLET" />
      <div class="color-row">
        <input type="color" id="clrAccent" value="#c8e000" />
        <span>Barva</span>
      </div>

      <label>Řádek 3 — podtitul</label>
      <input type="text" id="txtSub" value="ROYAL BAY!" />
      <div class="color-row">
        <input type="color" id="clrSub" value="#ffffff" />
        <span>Barva</span>
      </div>
    </div>

    <!-- Text style -->
    <div class="panel-section">
      <div class="section-title">Styl textu</div>

      <label>Velikost (hlavní řádek)</label>
      <div class="range-row">
        <input type="range" id="mainFontSize" min="40" max="160" value="88" />
        <span class="val" id="mainFontVal">88</span>
      </div>

      <label>Posunutí vertikálně</label>
      <div class="range-row">
        <input type="range" id="textOffset" min="-300" max="300" value="0" />
        <span class="val" id="textOffsetVal">0</span>
      </div>

      <label>Zarovnání</label>
      <select id="textAlign">
        <option value="left">Vlevo</option>
        <option value="center" selected>Na střed</option>
        <option value="right">Vpravo</option>
      </select>

      <label>Font</label>
      <select id="fontFamily">
        <option value="Bebas Neue" selected>Bebas Neue (brand)</option>
        <option value="Oswald">Oswald</option>
      </select>
    </div>

    <!-- Discount badge -->
    <div class="panel-section">
      <div class="section-title">Odznak slevy</div>
      <div class="toggle-row">
        <label>Zobrazit</label>
        <label class="toggle">
          <input type="checkbox" id="showBadge" checked />
          <span class="knob"></span>
        </label>
      </div>

      <label>Text</label>
      <input type="text" id="badgeText" value="-30 %" />

      <label>Pozice</label>
      <select id="badgePos">
        <option value="top-left">Vlevo nahoře</option>
        <option value="top-right">Vpravo nahoře</option>
        <option value="bottom-left" selected>Vlevo dole</option>
        <option value="bottom-right">Vpravo dole</option>
      </select>

      <div class="color-row" style="margin-top:8px">
        <input type="color" id="clrBadgeBg" value="#111111" />
        <span>Pozadí odznaku</span>
      </div>
      <div class="color-row">
        <input type="color" id="clrBadgeText" value="#c8e000" />
        <span>Text odznaku</span>
      </div>
    </div>

    <!-- Logo -->
    <div class="panel-section">
      <div class="section-title">Logo</div>
      <div class="toggle-row">
        <label>Zobrazit ×RB logo</label>
        <label class="toggle">
          <input type="checkbox" id="showLogo" checked />
          <span class="knob"></span>
        </label>
      </div>

      <label class="upload-area" for="logoUpload" style="margin-top:10px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Vlastní logo (PNG s průhledností)
      </label>
      <input type="file" id="logoUpload" accept="image/*" style="display:none" />
    </div>

  </aside>

  <!-- ── CANVAS ── -->
  <main class="canvas-area">
    <div class="canvas-wrapper" id="canvasWrapper">
      <canvas id="bannerCanvas"></canvas>
    </div>

    <div class="size-label" id="sizeInfo">1200 × 628 px</div>

    <div class="actions">
      <button class="btn btn-lime" onclick="downloadBanner('png')">↓ PNG</button>
      <button class="btn btn-ghost" onclick="downloadBanner('jpg')">↓ JPG</button>
      <button class="btn btn-ghost" onclick="resetAll()">Resetovat</button>
    </div>
  </main>

</div>

<script>
  const canvas = document.getElementById('bannerCanvas');
  const ctx = canvas.getContext('2d');

  let bgImage = null;
  let logoImage = null;
  let W = 1200, H = 628;

  // Responsive display scale
  function getScale() {
    const maxW = window.innerWidth - 300 - 56;
    const maxH = window.innerHeight - 52 - 100;
    return Math.min(maxW / W, maxH / H, 0.7);
  }

  function setFormat(w, h) {
    W = w; H = h;
    canvas.width = w;
    canvas.height = h;
    const s = getScale();
    canvas.style.width  = Math.round(w * s) + 'px';
    canvas.style.height = Math.round(h * s) + 'px';
    document.getElementById('sizeInfo').textContent = `${w} × ${h} px`;
    render();
  }

  // Format buttons
  document.getElementById('formatGrid').querySelectorAll('.fmt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.fmt-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      // Auto-set alignment
      document.getElementById('textAlign').value = btn.dataset.align || 'center';
      setFormat(+btn.dataset.w, +btn.dataset.h);
    });
  });

  // Brand palette swatches — copy color to clipboard + highlight last clicked
  let lastSwatchTarget = null;
  document.querySelectorAll('.swatch').forEach(sw => {
    sw.addEventListener('click', () => {
      const color = sw.dataset.color;
      navigator.clipboard?.writeText(color).catch(() => {});
      // Visual feedback
      sw.style.outline = '2px solid #c8e000';
      setTimeout(() => sw.style.outline = '', 800);
      // If a color picker was recently focused, set it
      if (lastSwatchTarget) {
        lastSwatchTarget.value = color;
        lastSwatchTarget.dispatchEvent(new Event('input'));
        lastSwatchTarget = null;
      }
    });
  });

  document.querySelectorAll('input[type="color"]').forEach(el => {
    el.addEventListener('focus', () => { lastSwatchTarget = el; });
    el.addEventListener('click', () => { lastSwatchTarget = el; });
  });

  // File uploads
  document.getElementById('bgUpload').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    loadImage(file, img => { bgImage = img; render(); });
  });

  document.getElementById('logoUpload').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    loadImage(file, img => { logoImage = img; render(); });
  });

  function loadImage(file, cb) {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => cb(img);
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  // Live inputs
  document.querySelectorAll('input, select').forEach(el => {
    el.addEventListener('input', render);
    el.addEventListener('change', render);
  });

  document.getElementById('overlayOpacity').addEventListener('input', function() {
    document.getElementById('overlayVal').textContent = this.value + '%';
  });
  document.getElementById('mainFontSize').addEventListener('input', function() {
    document.getElementById('mainFontVal').textContent = this.value;
  });
  document.getElementById('textOffset').addEventListener('input', function() {
    document.getElementById('textOffsetVal').textContent = this.value;
  });

  // ── RENDER ──────────────────────────────────────
  function render() {
    ctx.clearRect(0, 0, W, H);

    // 1. Background
    if (bgImage) {
      const sc = Math.max(W / bgImage.width, H / bgImage.height);
      const sw = bgImage.width * sc, sh = bgImage.height * sc;
      ctx.drawImage(bgImage, (W - sw) / 2, (H - sh) / 2, sw, sh);
    } else {
      const g = ctx.createLinearGradient(0, 0, W, H);
      g.addColorStop(0, '#1c2510');
      g.addColorStop(1, '#0a0f05');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = 'rgba(200,224,0,0.04)';
      ctx.fillRect(0, 0, W, H);
      // Guide text
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.textAlign = 'center';
      ctx.font = `${Math.round(W * 0.022)}px Inter`;
      ctx.fillText('↑ Nahrajte fotku pozadí', W / 2, H / 2);
    }

    // 2. Overlay
    const opa = document.getElementById('overlayOpacity').value / 100;
    ctx.fillStyle = `rgba(0,0,0,${opa})`;
    ctx.fillRect(0, 0, W, H);

    const sc = W / 1200;
    const font = document.getElementById('fontFamily').value;

    // 3. Brand watermark top-left
    const watermarkTxt = document.getElementById('txtWatermark').value;
    if (watermarkTxt) {
      drawWatermark(watermarkTxt, sc, font);
    }

    // 4. Main text block
    drawTextBlock(sc, font);

    // 5. Discount badge
    if (document.getElementById('showBadge').checked) {
      drawBadge(sc, font);
    }

    // 6. Logo top-right
    if (document.getElementById('showLogo').checked) {
      drawLogo(sc, font);
    }
  }

  // ── WATERMARK (top-left) ─────────────────────────
  function drawWatermark(text, sc, font) {
    const margin = 26 * sc;
    const sz = 15 * sc;
    ctx.font = `400 ${Math.round(sz)}px ${font}`;
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.textAlign = 'left';
    ctx.shadowBlur = 0;
    ctx.fillText(text, margin, margin + sz);
  }

  // ── TEXT BLOCK ───────────────────────────────────
  function drawTextBlock(sc, font) {
    const align  = document.getElementById('textAlign').value;
    const offset = +document.getElementById('textOffset').value;
    const baseSize = +document.getElementById('mainFontSize').value * sc;

    const txtMain   = document.getElementById('txtMain').value;
    const txtAccent = document.getElementById('txtAccent').value;
    const txtSub    = document.getElementById('txtSub').value;

    const clrMain   = document.getElementById('clrMain').value;
    const clrAccent = document.getElementById('clrAccent').value;
    const clrSub    = document.getElementById('clrSub').value;

    const accentSize = baseSize * 1.08;
    const subSize    = baseSize * 0.34;

    // Line heights
    const lineMain   = baseSize   * 1.0;
    const lineAccent = accentSize * 0.95;
    const lineSub    = subSize    * 1.3;

    const totalH = lineMain + lineAccent + lineSub;
    let startY = (H - totalH) / 2 + offset * sc;

    let textX;
    const margin = W * 0.06;
    if (align === 'left')       textX = margin;
    else if (align === 'right') textX = W - margin;
    else                        textX = W / 2;

    ctx.textAlign = align;
    ctx.shadowColor = 'rgba(0,0,0,0.7)';
    ctx.shadowBlur  = 18 * sc;

    if (txtMain) {
      ctx.font = `400 ${Math.round(baseSize)}px ${font}`;
      ctx.fillStyle = clrMain;
      ctx.globalAlpha = 1;
      ctx.fillText(txtMain, textX, startY + lineMain);
    }

    startY += lineMain;

    if (txtAccent) {
      ctx.font = `400 ${Math.round(accentSize)}px ${font}`;
      ctx.fillStyle = clrAccent;
      ctx.fillText(txtAccent, textX, startY + lineAccent);
    }

    startY += lineAccent;

    if (txtSub) {
      ctx.font = `400 ${Math.round(subSize)}px ${font}`;
      ctx.fillStyle = clrSub;
      ctx.globalAlpha = 0.85;
      ctx.fillText(txtSub, textX, startY + lineSub + 4 * sc);
    }

    ctx.globalAlpha = 1;
    ctx.shadowBlur  = 0;
  }

  // ── BADGE ────────────────────────────────────────
  function drawBadge(sc, font) {
    const text    = document.getElementById('badgeText').value;
    const pos     = document.getElementById('badgePos').value;
    const bgColor = document.getElementById('clrBadgeBg').value;
    const txtColor= document.getElementById('clrBadgeText').value;
    if (!text) return;

    const pad = 16 * sc;
    const fontSize = 36 * sc;
    ctx.font = `400 ${Math.round(fontSize)}px ${font}`;
    const tw = ctx.measureText(text).width;
    const bw = tw + pad * 2;
    const bh = fontSize + pad * 1.2;
    const margin = 26 * sc;

    let bx, by;
    if (pos === 'top-left')     { bx = margin; by = margin; }
    else if (pos === 'top-right') { bx = W - bw - margin; by = margin; }
    else if (pos === 'bottom-left') { bx = margin; by = H - bh - margin; }
    else                         { bx = W - bw - margin; by = H - bh - margin; }

    // Badge bg
    ctx.fillStyle = bgColor;
    ctx.globalAlpha = 0.9;
    roundRect(bx, by, bw, bh, 4 * sc);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Badge text
    ctx.fillStyle = txtColor;
    ctx.textAlign = 'center';
    ctx.shadowBlur = 0;
    ctx.fillText(text, bx + bw / 2, by + bh * 0.73);
  }

  // ── LOGO (top-right) ─────────────────────────────
  function drawLogo(sc, font) {
    const margin = 22 * sc;

    if (logoImage) {
      const lh = 44 * sc;
      const lw = (logoImage.width / logoImage.height) * lh;
      ctx.globalAlpha = 0.92;
      ctx.drawImage(logoImage, W - lw - margin, margin, lw, lh);
      ctx.globalAlpha = 1;
    } else {
      // Draw ×RB brand logo
      const sz  = 24 * sc;
      const pad = 10 * sc;

      // Measure combined text: × RB
      ctx.font = `400 ${Math.round(sz)}px ${font}`;
      const crossW = ctx.measureText('×').width;
      const rbW    = ctx.measureText('RB').width;
      const gap    = 3 * sc;
      const totalW = crossW + gap + rbW;
      const bw = totalW + pad * 2;
      const bh = sz + pad * 1.0;
      const bx = W - bw - margin;
      const by = margin;

      // Semi-transparent dark background
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.globalAlpha = 1;
      roundRect(bx, by, bw, bh, 3 * sc);
      ctx.fill();

      // × in lime
      ctx.textAlign = 'left';
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#c8e000';
      ctx.fillText('×', bx + pad, by + bh * 0.76);

      // RB in white
      ctx.fillStyle = '#ffffff';
      ctx.fillText('RB', bx + pad + crossW + gap, by + bh * 0.76);
    }
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  // ── DOWNLOAD ─────────────────────────────────────
  function downloadBanner(fmt) {
    const mime = fmt === 'jpg' ? 'image/jpeg' : 'image/png';
    const quality = fmt === 'jpg' ? 0.95 : 1;
    const fmtId = document.querySelector('.fmt-btn.active')?.dataset.id || 'banner';
    const a = document.createElement('a');
    a.href = canvas.toDataURL(mime, quality);
    a.download = `royalbay-${fmtId}-${Date.now()}.${fmt}`;
    a.click();
  }

  // ── RESET ────────────────────────────────────────
  function resetAll() {
    bgImage = null;
    logoImage = null;
    document.getElementById('txtWatermark').value = 'ROYAL BAY';
    document.getElementById('txtMain').value   = 'SPOUŠTÍME';
    document.getElementById('txtAccent').value = 'OUTLET';
    document.getElementById('txtSub').value    = 'ROYAL BAY!';
    document.getElementById('clrMain').value   = '#ffffff';
    document.getElementById('clrAccent').value = '#c8e000';
    document.getElementById('clrSub').value    = '#ffffff';
    document.getElementById('overlayOpacity').value = 45;
    document.getElementById('overlayVal').textContent = '45%';
    document.getElementById('badgeText').value = '-30 %';
    document.getElementById('showBadge').checked = true;
    document.getElementById('showLogo').checked  = true;
    document.getElementById('mainFontSize').value = 88;
    document.getElementById('mainFontVal').textContent = '88';
    document.getElementById('textOffset').value = 0;
    document.getElementById('textOffsetVal').textContent = '0';
    document.getElementById('textAlign').value = 'center';
    document.getElementById('fontFamily').value = 'Bebas Neue';
    document.getElementById('clrBadgeBg').value = '#111111';
    document.getElementById('clrBadgeText').value = '#c8e000';
    document.getElementById('badgePos').value = 'bottom-left';
    render();
  }

  // ── DRAG & DROP ──────────────────────────────────
  const wrapper = document.getElementById('canvasWrapper');
  wrapper.addEventListener('dragover', e => { e.preventDefault(); wrapper.style.outline = '2px dashed #c8e000'; });
  wrapper.addEventListener('dragleave', () => wrapper.style.outline = '');
  wrapper.addEventListener('drop', e => {
    e.preventDefault();
    wrapper.style.outline = '';
    const file = e.dataTransfer.files[0];
    if (file?.type.startsWith('image/')) {
      loadImage(file, img => { bgImage = img; render(); });
    }
  });

  // ── INIT ─────────────────────────────────────────
  setFormat(1200, 628);
</script>
</body>
